<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="favicon-sovereign" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="favicon-apps" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b041;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="favicon-blocks" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00883d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#003d82"/>

  <!-- Pyramid: Top 3 layers only -->
  <!-- Layer 1 (Sovereign – White) – 1 segment, centered -->
  <rect x="78" y="50" width="100" height="50" rx="3" fill="url(#favicon-sovereign)" stroke="#002d62" stroke-width="1"/>

  <!-- Layer 2 (Applications – Orange) – 2 segments -->
  <rect x="48" y="110" width="75" height="50" rx="3" fill="url(#favicon-apps)"/>
  <rect x="133" y="110" width="75" height="50" rx="3" fill="url(#favicon-apps)"/>

  <!-- Layer 3 (Building Blocks – Green) – 3 segments -->
  <rect x="28" y="170" width="60" height="50" rx="3" fill="url(#favicon-blocks)"/>
  <rect x="98" y="170" width="60" height="50" rx="3" fill="url(#favicon-blocks)"/>
  <rect x="168" y="170" width="60" height="50" rx="3" fill="url(#favicon-blocks)"/>
</svg>
