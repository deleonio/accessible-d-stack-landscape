<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
	<rect width="200" height="200" rx="12" fill="#f0f1f3" />
	<!-- Classic broken-image icon: landscape with torn corner -->
	<g transform="translate(100, 92)">
		<!-- Photo frame -->
		<rect x="-44" y="-44" width="88" height="88" rx="6" fill="none" stroke="#b0b4ba" stroke-width="4" />
		<!-- Mountain landscape -->
		<polygon points="-32,28 -10,-12 8,10 22,-6 36,28" fill="#c8ccd2" />
		<!-- Sun -->
		<circle cx="22" cy="-22" r="10" fill="#c8ccd2" />
		<!-- Diagonal tear line across the frame -->
		<line x1="-44" y1="20" x2="10" y2="-44" stroke="#f0f1f3" stroke-width="5" />
		<line x1="-44" y1="20" x2="10" y2="-44" stroke="#b0b4ba" stroke-width="2" stroke-dasharray="6 4" />
	</g>
</svg>
