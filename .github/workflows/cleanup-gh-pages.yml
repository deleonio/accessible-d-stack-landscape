name: Clean GitHub Pages

on:
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clean all content from gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          git clone --depth 1 --branch gh-pages "${REMOTE_URL}" gh-pages

          cd gh-pages

          # Alles außer .git löschen
          find . -maxdepth 1 -not -name '.git' -not -name '.' -not -name '..' -type f -delete
          find . -maxdepth 1 -not -name '.git' -not -name '.' -not -name '..' -type d -exec rm -rf {} +

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: clean all content from gh-pages branch (manual cleanup)" || echo "Nothing to commit"
          git push origin gh-pages

          echo "GitHub Pages cleaned."
