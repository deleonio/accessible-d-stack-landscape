name: Cleanup All PR Previews

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove all PR preview folders from gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          git clone --depth 1 --branch gh-pages "${REMOTE_URL}" gh-pages

          cd gh-pages

          if [ ! -d pr-preview ]; then
            echo "No pr-preview directory found, nothing to clean up."
            exit 0
          fi

          echo "Found PR preview folders:"
          ls pr-preview/

          rm -rf pr-preview

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: remove all PR preview folders (manual cleanup)"
          git push origin gh-pages

          echo "All PR previews removed."
