name: CI

on:
  pull_request:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm i

      - name: Type check
        run: pnpm lint

      - name: ESLint
        run: pnpm eslint

      - name: Stylelint
        run: pnpm stylelint

      - name: Prettier
        run: pnpm format

      - name: Knip
        run: pnpm check-unused

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_URL: /accessible-d-stack-landscape/
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_ENABLE_PWA: 'true'

