name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    name: Build & Playwright Tests
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (tsc)
        run: pnpm lint

      - name: ESLint
        run: pnpm eslint

      - name: Stylelint
        run: pnpm stylelint

      - name: Prettier
        run: pnpm format

      - name: Knip (unused exports/deps)
        run: pnpm check-unused

      - name: Build
        run: pnpm build
        env:
          VITE_COMMIT_SHA: >-
            ${{ github.event_name == 'pull_request'
              && github.event.pull_request.head.sha
              || github.sha }}

