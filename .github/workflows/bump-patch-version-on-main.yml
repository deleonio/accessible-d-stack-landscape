name: Bump patch version on main

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bump-patch-version-main
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event.pull_request.merged == true && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Increase patch version in package.json
        run: npm version patch --no-git-tag-version

      - name: Commit and push bumped version
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain package.json)" ]; then
            echo "No version change detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NEW_VERSION="$(node -p "require('./package.json').version")"
          git add package.json
          git commit -m "chore(release): bump patch version to ${NEW_VERSION} [skip ci]"
          git push origin HEAD:main
