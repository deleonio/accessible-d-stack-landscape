name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_COMMIT_SHA: >-
            ${{ github.event_name == 'pull_request'
              && github.event.pull_request.head.sha
              || github.sha }}
          VITE_ENABLE_PWA: >-
            ${{ github.event_name == 'pull_request'
              && 'false'
              || 'true' }}
          VITE_BASE_URL: >-
            ${{ github.event_name == 'pull_request'
              && format('/accessible-d-stack-landscape/pr-preview/pr-{0}/', github.event.number)
              || '/accessible-d-stack-landscape/' }}

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  deploy-main:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish main site and preserve PR previews
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${REMOTE_URL}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${REMOTE_URL}" gh-pages
          else
            git clone --depth 1 "${REMOTE_URL}" gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          cd gh-pages
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name pr-preview -exec rm -rf {} +
          cp -a ../dist/. .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy main site (${GITHUB_SHA})"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi

  deploy-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist/
          umbrella-dir: pr-preview

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist/
          umbrella-dir: pr-preview
          action: remove
