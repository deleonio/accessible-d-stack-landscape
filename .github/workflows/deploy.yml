name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'stand/**'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  validate-pages-config:
    runs-on: ubuntu-latest
    steps:
      - name: Validate GitHub Pages source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          PAGE_CONFIG="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}/pages")"

          SOURCE_BRANCH="$(echo "${PAGE_CONFIG}" | jq -r '.source.branch // empty')"
          SOURCE_PATH="$(echo "${PAGE_CONFIG}" | jq -r '.source.path // empty')"

          if [ "${SOURCE_BRANCH}" != "gh-pages" ] || [ "${SOURCE_PATH}" != "/" ]; then
            echo "GitHub Pages must publish from branch 'gh-pages' and path '/'."
            echo "Current config: branch='${SOURCE_BRANCH}', path='${SOURCE_PATH}'"
            exit 1
          fi

  build:
    needs: validate-pages-config
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
      base: ${{ steps.slug.outputs.base }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute slug and base URL
        id: slug
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "slug=" >> "$GITHUB_OUTPUT"
            echo "base=/accessible-d-stack-landscape/" >> "$GITHUB_OUTPUT"
          else
            SLUG="${BRANCH#stand/}"
            echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
            echo "base=/accessible-d-stack-landscape/${SLUG}/" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_ENABLE_PWA: 'true'
          VITE_BASE_URL: ${{ steps.slug.outputs.base }}

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SLUG: ${{ needs.build.outputs.slug }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${REMOTE_URL}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${REMOTE_URL}" gh-pages
          else
            git clone --depth 1 "${REMOTE_URL}" gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          cd gh-pages

          if [ -z "${SLUG}" ]; then
            # main → Root ersetzen, alle Stand-Unterordner erhalten
            # Lies .stands Manifest um Stand-Ordner zu kennen
            PRESERVE=(".git" ".stands")
            if [ -f .stands ]; then
              while IFS= read -r line; do
                [ -n "$line" ] && PRESERVE+=("$line")
              done < .stands
            fi
            # Lösche alles außer .git, .stands und den Stand-Ordnern
            for entry in . .. .* *; do
              [ "$entry" = "." ] || [ "$entry" = ".." ] && continue
              keep=false
              for p in "${PRESERVE[@]}"; do
                [ "$entry" = "$p" ] && keep=true && break
              done
              $keep || rm -rf "$entry"
            done
            cp -a ../dist/. .
          else
            # stand/* → nur eigenen Unterordner ersetzen + Manifest aktualisieren
            rm -rf "${SLUG}"
            cp -a ../dist/. "${SLUG}/"
            # Slug in .stands eintragen falls noch nicht vorhanden
            touch .stands
            if ! grep -qx "${SLUG}" .stands; then
              echo "${SLUG}" >> .stands
              sort -o .stands .stands
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy ${SLUG:-main} (${GITHUB_SHA})"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi
