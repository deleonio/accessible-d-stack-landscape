name: Deploy PR-Preview to GitHub Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: gh-pages-pr-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  SLUG: pr-${{ github.event.pull_request.number }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm i

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_URL: /accessible-d-stack-landscape/${{ env.SLUG }}/
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_ENABLE_PWA: 'false'

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ env.SLUG }}
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist-${{ env.SLUG }}
          path: dist/

      - name: Publish Preview to gh-pages subfolder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SLUG: ${{ env.SLUG }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${REMOTE_URL}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${REMOTE_URL}" gh-pages
          else
            git clone --depth 1 "${REMOTE_URL}" gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          cd gh-pages

          # Unterordner des Ständers ersetzen
          rm -rf "${SLUG}"
          cp -a ../dist/. "${SLUG}/"

          # Slug im .stands Manifest registrieren
          touch .stands
          if ! grep -qx "${SLUG}" .stands; then
            echo "${SLUG}" >> .stands
            sort -o .stands .stands
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy Ständer '${SLUG}' (${GITHUB_SHA})"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi

      - name: Post Preview Comment
        uses: ./.github/actions/post-preview-comment
        with:
          slug: ${{ env.SLUG }}
          repository-owner: ${{ github.repository_owner }}
