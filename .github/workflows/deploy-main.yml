name: Deploy main-Branch to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages-main-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm i

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_URL: '/accessible-d-stack-landscape/'
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_ENABLE_PWA: 'false'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
