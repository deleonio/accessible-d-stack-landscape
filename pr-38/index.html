		<style>
			/* ─── Splash / Intro Animation ──────────────────────────────────────── */
			.splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: linear-gradient(170deg, #002d62 0%, #003d82 40%, #004a9e 100%);
				overflow: hidden;
				transition: opacity 0.6s ease, transform 0.6s ease;
			}
			.splash--exiting {
				opacity: 0;
				transform: scale(1.04);
				pointer-events: none;
			}
			.splash__content {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1.8rem;
			}

			/* ── Fixed label display ── */
			.splash__labels {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.25rem;
				min-height: 5.5rem;
			}
			.splash__fixed-label {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(0.72rem, 2vw, 0.88rem);
				font-weight: 600;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				opacity: 0;
				transform: translateY(6px);
				animation: splashLabelFade 0.6s ease forwards;
			}
			.splash__fixed-label--1 { animation-delay: 1.2s; color: #f4a0a8; }
			.splash__fixed-label--2 { animation-delay: 3.0s; color: #8bb8e8; }
			.splash__fixed-label--3 { animation-delay: 4.8s; color: #7fd4a0; }
			.splash__fixed-label--4 { animation-delay: 6.2s; color: #fad78c; }

			/* ── Pyramid bars ── */
			.splash__pyramid {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 6px;
			}
			.splash__bar {
				border-radius: 6px;
				opacity: 0;
				transform: translateY(50px) scaleX(0.7);
				animation: splashBarRise 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
				box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
				height: 18px;
			}

			/* Layer 1 – Infrastruktur (base, widest) */
			.splash__bar--1 {
				width: min(380px, 82vw);
				background: linear-gradient(90deg, #c5192d, #d4303f);
				animation-delay: 0s;
			}
			/* Layer 2 – Plattform */
			.splash__bar--2 {
				width: min(300px, 65vw);
				background: linear-gradient(90deg, #1a56a0, #2068bf);
				animation-delay: 1.8s;
			}
			/* Layer 3 – Betrieb */
			.splash__bar--3 {
				width: min(220px, 48vw);
				background: linear-gradient(90deg, #00883d, #00a34a);
				animation-delay: 3.6s;
			}
			/* Layer 4 – Zugang (top, narrowest) */
			.splash__bar--4 {
				width: min(140px, 32vw);
				background: linear-gradient(90deg, #f39c12, #f5b041);
				animation-delay: 5.2s;
			}

			@keyframes splashBarRise {
				0% {
					opacity: 0;
					transform: translateY(50px) scaleX(0.7);
				}
				60% {
					opacity: 1;
					transform: translateY(-4px) scaleX(1.02);
				}
				100% {
					opacity: 1;
					transform: translateY(0) scaleX(1);
				}
			}
			@keyframes splashLabelFade {
				from {
					opacity: 0;
					transform: translateY(6px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* ── Sovereign Standard crown ── */
			.splash__sovereign {
				opacity: 0;
				transform: translateY(8px);
				animation: splashLabelFade 0.8s ease forwards;
				animation-delay: 7.0s;
				text-align: center;
			}
			.splash__sovereign-text {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(0.7rem, 2vw, 0.85rem);
				font-weight: 700;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.85);
				border: 1px solid rgba(255, 255, 255, 0.25);
				padding: 0.3em 1em;
				border-radius: 4px;
			}

			/* ── App title ── */
			.splash__title {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.3rem;
				opacity: 0;
				transform: translateY(12px);
				animation: splashLabelFade 0.8s ease forwards;
				animation-delay: 8.0s;
			}
			.splash__label {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: 0.8rem;
				font-weight: 600;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.5);
			}
			.splash__heading {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(1.5rem, 5vw, 2.2rem);
				font-weight: 700;
				color: #fff;
				letter-spacing: 0.02em;
			}

			/* ── Accessibility: reduced motion ── */
			@media (prefers-reduced-motion: reduce) {
				.splash__bar,
				.splash__fixed-label,
				.splash__sovereign,
				.splash__title {
					animation: none;
					opacity: 1;
					transform: none;
				}
				.splash__fixed-label {
					color: rgba(255, 255, 255, 0.7);
				}
				.splash {
					transition-duration: 0.25s;
				}
			}

			/* ── Screen-reader only ── */
			.splash-sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}
		</style>

	<body>
		<div id="splash" class="splash" role="status" aria-label="Anwendung wird geladen">
			<div class="splash__content">
				<!-- Fixed label area: labels fade in here and stay -->
				<div class="splash__labels" aria-hidden="true">
					<span class="splash__fixed-label splash__fixed-label--1">Infrastruktur</span>
					<span class="splash__fixed-label splash__fixed-label--2">Plattform</span>

				<div class="splash__pyramid" aria-hidden="true">

					<div class="splash__sovereign">

					</div>
					<!-- Top → Bottom: narrowest to widest (pyramid) -->
					<div class="splash__bar splash__bar--4"></div>
					<div class="splash__bar splash__bar--3"></div>
					<div class="splash__bar splash__bar--2"></div>
					<div class="splash__bar splash__bar--1"></div>
				</div>

				<div class="splash__title" aria-hidden="true">
					<span class="splash__label">Public Digital Infrastructure</span>
					<span class="splash__heading">StackAtlas</span>
				</div>
			</div>
			<span class="splash-sr-only" aria-live="polite" id="splash-status">Anwendung wird geladen</span>
		</div>
		<div id="app"></div>
