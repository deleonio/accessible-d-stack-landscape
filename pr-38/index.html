		<style>
			/* ─── Splash / Intro Animation ──────────────────────────────────────── */
			.splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #003d82;
				overflow: hidden;
				transition: opacity 0.45s ease, transform 0.45s ease;
			}
			.splash--exiting {
				opacity: 0;
				transform: scale(1.03);
				pointer-events: none;
			}
			.splash__content {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2.5rem;
			}

			/* Stack layers */
			.splash__stack {
				display: flex;
				flex-direction: column-reverse;
				align-items: center;
				gap: 10px;
			}
			.splash__layer {
				height: 14px;
				border-radius: 7px;
				opacity: 0;
				transform: translateY(60px);
				animation: splashSlideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
			}
			.splash__layer--1 {
				width: min(220px, 55vw);
				background: #00883d;
				animation-delay: 0s;
			}
			.splash__layer--2 {
				width: min(260px, 62vw);
				background: #c5192d;
				animation-delay: 0.15s;
			}
			.splash__layer--3 {
				width: min(300px, 69vw);
				background: #1a56a0;
				animation-delay: 0.3s;
			}
			.splash__layer--4 {
				width: min(340px, 76vw);
				background: #f39c12;
				animation-delay: 0.45s;
			}

			@keyframes splashSlideUp {
				from {
					opacity: 0;
					transform: translateY(60px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* Title */
			.splash__title {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.35rem;
				opacity: 0;
				transform: translateY(12px);
				animation: splashFadeInUp 0.6s ease forwards;
				animation-delay: 0.8s;
			}
			.splash__label {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: 0.85rem;
				font-weight: 600;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.6);
			}
			.splash__heading {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(1.25rem, 4vw, 1.75rem);
				font-weight: 700;
				color: #fff;
			}

			@keyframes splashFadeInUp {
				from {
					opacity: 0;
					transform: translateY(12px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* Accessibility: reduced motion */
			@media (prefers-reduced-motion: reduce) {
				.splash__layer,
				.splash__title {
					animation: none;
					opacity: 1;
					transform: none;
				}
				.splash {
					transition-duration: 0.2s;
				}
			}

			/* Screen-reader only utility */
			.splash-sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}
		</style>

			</div>

		</div>
