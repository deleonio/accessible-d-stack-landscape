		<style>
			/* ─── Splash / Intro Animation ──────────────────────────────────────── */
			.splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: linear-gradient(170deg, #002d62 0%, #003d82 40%, #004a9e 100%);
				overflow: hidden;
				transition: opacity 0.6s ease, transform 0.6s ease;
			}
			.splash--exiting {
				opacity: 0;
				transform: scale(1.04);
				pointer-events: none;
			}
			.splash__content {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2rem;
			}

			/* ── Pyramid stack ── */
			.splash__pyramid {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0;
			}
			/* Each row: label above + colored bar */
			.splash__row {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			.splash__row-label {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(0.65rem, 1.8vw, 0.8rem);
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0);
				margin-bottom: 4px;
				animation: splashLabelFade 0.5s ease forwards;
			}
			.splash__bar {
				border-radius: 6px;
				opacity: 0;
				transform: translateY(50px) scaleX(0.7);
				animation: splashBarRise 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
				box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
			}

			/* Pyramid: bottom = widest, top = narrowest */
			/* Layer 1 – Infrastruktur (base, widest) */
			.splash__row--1 .splash__bar {
				width: min(380px, 82vw);
				height: 18px;
				background: linear-gradient(90deg, #c5192d, #d4303f);
				animation-delay: 0s;
			}
			.splash__row--1 .splash__row-label {
				animation-delay: 0.5s;
				color: #f4a0a8;
			}

			/* Layer 2 – Plattform */
			.splash__row--2 .splash__bar {
				width: min(300px, 65vw);
				height: 18px;
				background: linear-gradient(90deg, #1a56a0, #2068bf);
				animation-delay: 0.6s;
			}
			.splash__row--2 .splash__row-label {
				animation-delay: 1.1s;
				color: #8bb8e8;
			}

			/* Layer 3 – Betrieb */
			.splash__row--3 .splash__bar {
				width: min(220px, 48vw);
				height: 18px;
				background: linear-gradient(90deg, #00883d, #00a34a);
				animation-delay: 1.2s;
			}
			.splash__row--3 .splash__row-label {
				animation-delay: 1.7s;
				color: #7fd4a0;
			}

			/* Layer 4 – Zugang (top, narrowest) */
			.splash__row--4 .splash__bar {
				width: min(140px, 32vw);
				height: 18px;
				background: linear-gradient(90deg, #f39c12, #f5b041);
				animation-delay: 1.8s;
			}
			.splash__row--4 .splash__row-label {
				animation-delay: 2.3s;
				color: #fad78c;
			}

			@keyframes splashBarRise {
				0% {
					opacity: 0;
					transform: translateY(50px) scaleX(0.7);
				}
				60% {
					opacity: 1;
					transform: translateY(-4px) scaleX(1.02);
				}
				100% {
					opacity: 1;
					transform: translateY(0) scaleX(1);
				}
			}
			@keyframes splashLabelFade {
				from {
					opacity: 0;
					transform: translateY(6px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* ── Sovereign Standard crown ── */
			.splash__sovereign {
				opacity: 0;
				transform: translateY(8px);
				animation: splashLabelFade 0.7s ease forwards;
				animation-delay: 2.8s;
				text-align: center;
				margin-bottom: 1.2rem;
			}
			.splash__sovereign-text {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(0.7rem, 2vw, 0.85rem);
				font-weight: 700;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.85);
				border: 1px solid rgba(255, 255, 255, 0.25);
				padding: 0.3em 1em;
				border-radius: 4px;
			}

			/* ── App title ── */
			.splash__title {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.3rem;
				opacity: 0;
				transform: translateY(12px);
				animation: splashLabelFade 0.7s ease forwards;
				animation-delay: 3.3s;
			}
			.splash__label {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: 0.8rem;
				font-weight: 600;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.5);
			}
			.splash__heading {
				font-family: 'Fira Sans', system-ui, sans-serif;
				font-size: clamp(1.5rem, 5vw, 2.2rem);
				font-weight: 700;
				color: #fff;
				letter-spacing: 0.02em;
			}

			/* ── Accessibility: reduced motion ── */
			@media (prefers-reduced-motion: reduce) {
				.splash__bar,
				.splash__row-label,
				.splash__sovereign,
				.splash__title {
					animation: none;
					opacity: 1;
					transform: none;
				}
				.splash__row-label {
					color: rgba(255, 255, 255, 0.7);
				}
				.splash {
					transition-duration: 0.25s;
				}
			}

			/* ── Screen-reader only ── */
			.splash-sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}
		</style>

	<body>

						<div class="splash__bar"></div>
					</div>
					<div class="splash__row splash__row--3">

					<div class="splash__row splash__row--2">

					</div>
					<div class="splash__row splash__row--1">
						<span class="splash__row-label">Infrastruktur</span>
						<div class="splash__bar"></div>
					</div>
				</div>
				<div class="splash__title" aria-hidden="true">
					<span class="splash__label">Public Digital Infrastructure</span>
					<span class="splash__heading">StackAtlas</span>
				</div>
			</div>
			<span class="splash-sr-only" aria-live="polite" id="splash-status">Anwendung wird geladen</span>
		</div>
		<div id="app"></div>
	</body>
