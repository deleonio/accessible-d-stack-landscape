<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b041;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00883d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2068bf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5192d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4303f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#003d82"/>

  <!-- Centered pyramid: all layers 216px wide, centered at x=20, vertically centered -->
  <!-- Layer heights: 34px each, gaps: 5px, total: 34*5 + 5*4 = 170 + 20 = 190px -->
  <!-- Vertical centering: (256 - 190) / 2 = 33px top/bottom padding -->

  <!-- Layer 1 (Sovereign – White) – 1 segment, y=33 -->
  <rect x="20" y="33" width="216" height="34" rx="2" fill="url(#grad-1)" stroke="#002d62" stroke-width="0.5"/>

  <!-- Layer 2 (Applications – Orange) – 2 segments, y=72 -->
  <rect x="20" y="72" width="106" height="34" rx="2" fill="url(#grad-2)"/>
  <rect x="130" y="72" width="106" height="34" rx="2" fill="url(#grad-2)"/>

  <!-- Layer 3 (Building Blocks – Green) – 3 segments, y=111 -->
  <rect x="20" y="111" width="70" height="34" rx="2" fill="url(#grad-3)"/>
  <rect x="94" y="111" width="69" height="34" rx="2" fill="url(#grad-3)"/>
  <rect x="167" y="111" width="69" height="34" rx="2" fill="url(#grad-3)"/>

  <!-- Layer 4 (Platform – Blue) – 4 segments, y=150 -->
  <rect x="20" y="150" width="51" height="34" rx="2" fill="url(#grad-4)"/>
  <rect x="75" y="150" width="51" height="34" rx="2" fill="url(#grad-4)"/>
  <rect x="130" y="150" width="51" height="34" rx="2" fill="url(#grad-4)"/>
  <rect x="185" y="150" width="51" height="34" rx="2" fill="url(#grad-4)"/>

  <!-- Layer 5 (Infrastructure – Red) – 5 segments, y=189 -->
  <rect x="20" y="189" width="40" height="34" rx="2" fill="url(#grad-5)"/>
  <rect x="64" y="189" width="40" height="34" rx="2" fill="url(#grad-5)"/>
  <rect x="108" y="189" width="40" height="34" rx="2" fill="url(#grad-5)"/>
  <rect x="152" y="189" width="40" height="34" rx="2" fill="url(#grad-5)"/>
  <rect x="196" y="189" width="40" height="34" rx="2" fill="url(#grad-5)"/>
</svg>
